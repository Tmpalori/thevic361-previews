  <g fill="#4E47B8">
    <ellipse cx="32" cy="20" rx="3.5" ry="3"/>
    <ellipse cx="28" cy="24" rx="3" ry="2.5"/>
    <ellipse cx="36" cy="24" rx="3" ry="2.5"/>
    <ellipse cx="29" cy="29" rx="3.5" ry="2.8"/>
    <ellipse cx="35" cy="29" rx="3.5" ry="2.8"/>
    <ellipse cx="32" cy="33" rx="4" ry="3"/>
  </g>
  <!-- Stem -->
  <line x1="32" y1="36" x2="32" y2="48" stroke="#7A9E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M32 42 Q24 41 22 45" stroke="#7A9E63" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M32 42 Q40 41 42 45" stroke="#7A9E63" stroke-width="2.5" fill="none" stroke-linecap="round"/>
